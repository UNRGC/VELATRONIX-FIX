# nginx del frontend: sirve la SPA y hace de reverse-proxy de la API en el mismo origen.
# Así el navegador solo habla con un dominio (ideal para Dokploy con un solo servicio expuesto).

upstream backend {
  # "backend" es el nombre del servicio en docker-compose; 4000 su puerto interno.
  server backend:4000;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Límite de subida (comprobantes ≤ 5 MB; deja margen para el multipart).
  client_max_body_size 12m;

  # API → backend. Se conserva /api en la ruta (el backend monta las rutas bajo /api).
  location /api/ {
    proxy_pass http://backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # Activos con hash → caché larga.
  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA: cualquier otra ruta sirve index.html (React Router se encarga).
  location / {
    try_files $uri $uri/ /index.html;
  }
}
