# Override de desarrollo local. Uso:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
# Añade Mailpit (correos de prueba) y publica puertos internos para depurar.

services:
  postgres:
    ports:
      - "5432:5432"

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # UI web
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  backend:
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment:
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
    ports:
      - "4000:4000"

  frontend:
    ports:
      - "5173:80"
