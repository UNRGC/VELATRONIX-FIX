# Compose base — orientado a producción / Dokploy.
# Solo el frontend expone puerto (sirve la SPA y hace de reverse-proxy de /api).
# El backend y postgres quedan en la red interna. Para desarrollo local usa además
# el override: `docker compose -f docker-compose.yml -f docker-compose.dev.yml up`.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-velatronix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?define POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-velatronix}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-velatronix}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET:?define JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-12h}
      ADMIN_NAME: ${ADMIN_NAME:-Administrador}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@velatronix.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?define ADMIN_PASSWORD}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Velatronix Reparaciones}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      INTERNAL_NOTIFY_EMAILS: ${INTERNAL_NOTIFY_EMAILS}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL}
      PORT: 4000
      UPLOAD_DIR: /data/uploads
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-5}
    volumes:
      - uploaded_files:/data/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    # Dokploy enruta su proxy (Traefik) a este puerto 80. En un VPS suelto, mapea el puerto
    # con el override de producción o publicando "80:80" aquí según tu necesidad.
    expose:
      - "80"
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  postgres_data:
  uploaded_files:
